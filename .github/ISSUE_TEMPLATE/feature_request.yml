name: Feature Request
description: Suggest a new capability or behavior change
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do that the current mechanism doesn't support?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should the behavior look like? (Code snippets or CLI examples welcome.)
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried, or other approaches you considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
