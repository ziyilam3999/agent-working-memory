name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      description: Step-by-step; include the exact commands you ran
      placeholder: |
        1. Run `...`
        2. Observe `...`
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: e.g. 20.10.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 14 / Windows 11 / Ubuntu 22.04
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error output; use triple backticks for formatting
